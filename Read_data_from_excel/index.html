<!DOCTYPE html>
<html>
<head>
    <title>Get a Quote</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f3f3f3;
            display: flex;
            justify-content: center;
            margin-top: 40px;
        }

        .container {
            width: 500px;
            background: white;
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        h2 {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-top: 15px;
            margin-bottom: 5px;
        }

        input,
        select,
        textarea {
            width: 100%;
            padding: 10px;
            box-sizing: border-box;
        }

        textarea {
            height: 100px;
        }

        button {
            margin-top: 20px;
            padding: 10px 20px;
            cursor: pointer;
        }
    </style>
</head>

<body>

<div class="container">

    <h2>Get a Quote</h2>

    <form id="quote-form">

        <label>Full Name:</label>
        <input type="text" id="full-name">

        <label>Email:</label>
        <input type="email" id="email">

        <label>Phone Number:</label>
        <input type="tel" id="phone">

        <label>Service Type:</label>
        <select id="service">
            <option>Select a service</option>
            <option>consulting</option>
            <option>Web Development</option>
            <option>Testing</option>
            <option>SEO</option>
        </select>

        <label>Project Details:</label>
        <textarea id="details"
        placeholder="Please provide details about your project..."></textarea>

        <button type="button" id="submit">
            Get Quote
        </button>

    </form>

</div>

<script>
document.getElementById("submit")
.addEventListener("click", function() {

    alert("Quote Submitted Successfully!");

});
</script>

</body>
</html>
